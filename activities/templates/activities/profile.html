{% extends "base.html" %}

{% block title %}Profile | Campus Volunteer{% endblock %}

{% block content %}

<div class="page">
  <div class="container">

    <h1 class="hero-title">My Profile</h1>

    <section class="card">

      <h2>Basic Information</h2>
      <div class="divider"></div>

      <form method="post">

        {% csrf_token %}

        <div class="field">
          <label>First Name</label>
          <input type="text" value="{{ user.first_name }}" disabled>
        </div>

        <div class="field">
          <label>Last Name</label>
          <input type="text" value="{{ user.last_name }}" disabled>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="text" value="{{ user.email }}" disabled>
        </div>

        <div class="field">
          <label>Phone</label>
          <input type="text" name="phone" value="{{ user.phone }}">
        </div>

        <div class="divider"></div>

        <h2>Volunteer Information</h2>

        <div class="field">
          <label>Skills</label>
          <textarea name="skills">{{ user.skills }}</textarea>
        </div>

        <div class="field">
          <label>Previous Experience</label>
          <textarea name="previous_experience">{{ user.previous_experience }}</textarea>
        </div>

        <button class="btn">
          Save Profile
        </button>

      </form>

    </section>

  </div>
</div>

{% endblock %}
