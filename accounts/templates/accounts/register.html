    {% extends "base.html" %}

    {% block title %}Register{% endblock %}

    {% block content %}
<div class="page">
  <div class="container">
    <h1 class="hero-title">Users / Organisers Register</h1>

    <section class="card">

    <h2>USER REGISTRATION</h2>
    <div class="divider"></div>

    <form method="post">

    {% csrf_token %}

    <div class="field">
        <label>First Name *</label>
        <input type="text" name="first_name" required>
    </div>

    <div class="field">
        <label>Last Name *</label>
        <input type="text" name="last_name" required>
    </div>

    <div class="field">
        <label>Phone Number *</label>
        <input type="text" name="phone" required>
    </div>

    <div class="field">
        <label>Email Address *</label>
        <input type="email" name="email" required autocomplete="off">
    </div>

    <div class="field">
        <label>Password *</label>
        <input type="password" name="password" required autocomplete="off">
    </div>

    <div class="field">
        <label>Confirm Password *</label>
        <input type="password" name="confirm_password" required>
    </div>

 <div class="field">

    <label class="label">Select Role *</label>

    <div class="role-option">
      <input type="radio" name="role" value="volunteer" id="volunteer" >
      <label for="volunteer">Volunteer – Browse and apply for activities</label>
    </div>

    <div class="role-option">
      <input type="radio" name="role" value="organiser" id="organiser">
      <label for="organiser">Organiser – Create and manage activities</label>
    </div>

</div>

    <button class="btn" type="submit">
            Register
    </button>

    </form>

    <div class="links">
        <a href="{% url 'login' %}">Already have an account? Login here</a>
    </div>

    </section>

    </form>

    </section>
  </div>
</div>
    {% endblock %}
