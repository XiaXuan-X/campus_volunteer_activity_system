{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="page">
  <div class="container">
    <h1 class="hero-title">Users / Organisers Register</h1>

    <section class="card">

      <h2>User Registration</h2>
      <div class="divider"></div>

      <form method="post" autocomplete="off">
        {% csrf_token %}

        <p class="form-note">
          * Required fields. Please complete all fields to create your account.
        </p>

        <div class="field">
          <label class="label" for="first_name">First Name *</label>
          <input id="first_name" type="text" name="first_name" required>
        </div>

        <div class="field">
          <label class="label" for="last_name">Last Name *</label>
          <input id="last_name" type="text" name="last_name" required>
        </div>

        <div class="field">
          <label class="label" for="phone">Phone Number *</label>
          <input id="phone" type="text" name="phone" required>
        </div>

        <div class="field">
          <label class="label" for="email">Email Address *</label>
          <input id="email" type="email" name="email" required autocomplete="off" placeholder="Enter your email">
        </div>

        <div class="field">
          <label class="label" for="password">Password *</label>
          <input id="password" type="password" name="password" required autocomplete="off" placeholder="Enter your password">
        </div>

        <div class="field">
          <label class="label" for="confirm_password">Confirm Password *</label>
          <input id="confirm_password" type="password" name="confirm_password" required placeholder="Re-enter your password">
        </div>

        <div class="field">
          <label class="label">Select Role *</label>

          <div class="role-option">
            <input type="radio" name="role" value="volunteer" id="volunteer" required>
            <label for="volunteer">Volunteer – Browse and apply for activities</label>
          </div>

          <div class="role-option">
            <input type="radio" name="role" value="organiser" id="organiser" required>
            <label for="organiser">Organiser – Create and manage activities</label>
          </div>
        </div>

        <button class="btn" type="submit">
          Register
        </button>
      </form>

      <div class="links">
        <a href="{% url 'login' %}">Already have an account? Login here</a>
      </div>

    </section>
  </div>
</div>
{% endblock %}
