{% extends "base.html" %}

{% block title %}Login | Campus Volunteer{% endblock %}

{% block content %}
 <div class="page">
  <div class="container">

    <h1 class="hero-title">Campus Volunteer Activity</h1>

    <section class="card">
      <h2>Login</h2>
      <div class="divider"></div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" autocomplete="off">
      {% csrf_token %}

      <div class="field">
        <label class="label" for="email">Email Address *</label>
        <input id="email" name="email" type="email" placeholder="Enter your email" required>
      </div>

      <div class="field">
        <label class="label" for="password">Password *</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required>
      </div>

      <button class="btn" type="submit" >Login</button>

      <div class="links">
        <a href="{% url 'register' %}">Don't have an account? Register here</a></br>
        <a href="{% url 'password_reset' %}">Forgot password? Reset it here</a>
      </div>
    </form>
  </section>
  </div>
</div>
{% endblock %}
